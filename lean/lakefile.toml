name = "OpenProof"
version = "0.1.0"
keywords = ["math", "formal-proof", "lean"]
defaultTargets = ["OpenProof"]

[leanOptions]
pp.unicode.fun = true
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.28.0"

[[lean_lib]]
name = "OpenProof"

[[lean_exe]]
name = "openproof-corpus-export"
root = "OpenProof.CorpusExport"
supportInterpreter = true
